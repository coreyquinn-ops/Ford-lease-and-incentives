<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ford Lease & Incentives Overlay Tool</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --brand-black: #000000; 
            --bg-gray: #f0f2f5; 
        }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg-gray); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px 20px; 
            margin: 0; 
        }
        
        .container { 
            background: white; 
            padding: 35px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            max-width: 1000px; 
            width: 100%; 
            text-align: center; 
        }
        
        h2 { 
            margin-top: 0; 
            color: var(--brand-black); 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .controls { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            margin-bottom: 30px; 
            align-items: flex-end; 
        }
        
        .field-group { 
            display: flex; 
            flex-direction: column; 
            text-align: left; 
        }
        
        label { 
            font-size: 11px; 
            font-weight: 700; 
            color: #666; 
            margin-bottom: 8px; 
            text-transform: uppercase; 
        }
        
        input { 
            padding: 12px; 
            border-radius: 8px; 
            border: 2px solid var(--brand-black); 
            font-size: 24px; 
            font-weight: 800; 
            width: 180px; 
            text-align: center; 
            outline: none; 
        }
        
        button { 
            background: var(--brand-black); 
            color: white; 
            border: none; 
            padding: 16px 32px; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: 800; 
            cursor: pointer; 
            transition: 0.2s; 
        }
        
        button:hover { 
            background: #333; 
            transform: translateY(-2px); 
        }
        
        canvas { 
            border: 1px solid #eee; 
            max-width: 100%; 
            height: auto; 
            border-radius: 8px; 
            background-color: #fff;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Ford Overlay Tool Finance</h2>

    <div class="controls">
        <div class="field-group">
            <label>Lease Rate (%)</label>
            <input type="text" id="rateInput" value="" placeholder="---" maxlength="4">
        </div>
        <div class="field-group">
            <label>Cash Incentive ($)</label>
            <input type="text" id="cashInput" value="" placeholder="----" maxlength="4">
        </div>
        <button id="downloadBtn">Download Final PNG</button>
    </div>

    <canvas id="canvas" width="1280" height="960"></canvas>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const rateInput = document.getElementById('rateInput');
    const cashInput = document.getElementById('cashInput');
    const downloadBtn = document.getElementById('downloadBtn');

    // Overlay coordinates (aligned to template header: "Lease from [%] or $[cash] cash incentive*")
    const RATE_X = 628;      // right edge, just before the % glyph
    const RATE_Y = 65;
    const CASH_X = 795;      // left edge, just after the $ glyph
    const CASH_Y = 65;
    const FONT_SIZE = 110;

    let templateImg = new Image();
    templateImg.src = "template.png";

    templateImg.onload = () => draw();

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(templateImg, 0, 0, 1280, 960);

        ctx.fillStyle = "white";
        ctx.font = `800 ${FONT_SIZE}px 'Poppins'`;
        ctx.textBaseline = "middle";

        if (rateInput.value.trim() !== "") {
            ctx.textAlign = "right";
            ctx.fillText(rateInput.value, RATE_X, RATE_Y);
        }

        if (cashInput.value.trim() !== "") {
            ctx.textAlign = "left";
            ctx.fillText(cashInput.value, CASH_X, CASH_Y);
        }
    }

    rateInput.addEventListener('input', draw);
    cashInput.addEventListener('input', draw);

    downloadBtn.addEventListener('click', () => {
        if (rateInput.value.trim() === "" && cashInput.value.trim() === "") {
            alert("Please enter a rate or cash incentive before downloading.");
            return;
        }

        const rate = rateInput.value.trim() || "X";
        const cash = cashInput.value.trim() || "X";
        const link = document.createElement('a');
        link.download = `Ford_Deal_${rate}pct_${cash}cash.png`;
        link.href = canvas.toDataURL("image/png");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    });
</script>
</body>
</html>
